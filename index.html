<body>
<!-- 簡易パスワードゲート（公開前の目隠し） -->
<div id="kura-gate" style="position:fixed;inset:0;z-index:99999;background:#F4EFE8;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Yu Mincho','YuMincho',serif;">
  <div style="font-size:12px;letter-spacing:.35em;color:#3D4A35;margin-bottom:28px;">KUMANO KODO KURA</div>
  <div style="font-size:13px;color:rgba(42,42,38,.6);margin-bottom:20px;letter-spacing:.1em;">準備中サイトです。パスワードを入力してください。</div>
  <input id="kura-pw" type="password" inputmode="numeric" autocomplete="off" placeholder="••••" style="border:none;border-bottom:1px solid #3D4A35;background:transparent;font-size:20px;padding:10px 4px;text-align:center;color:#2A2A26;outline:none;width:180px;letter-spacing:.3em;" />
  <div id="kura-err" style="font-size:12px;color:#A85542;margin-top:14px;height:16px;letter-spacing:.05em;"></div>
</div>
<script>
(function(){
  var GATE = document.getElementById('kura-gate');
  var PW = '3290';
  if (sessionStorage.getItem('kura_auth') === '1') { GATE.style.display = 'none'; return; }
  var inp = document.getElementById('kura-pw');
  var err = document.getElementById('kura-err');
  setTimeout(function(){ inp.focus(); }, 100);
  function check(){
    if (inp.value === PW) { sessionStorage.setItem('kura_auth','1'); GATE.style.display = 'none'; }
    else { err.textContent = 'パスワードが違います'; inp.value = ''; inp.focus(); }
  }
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') check(); });
})();
</script>

<div id="root"></div>
